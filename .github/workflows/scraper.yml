name: Scraper Diario

on:
  schedule:
    - cron: '0 9 * * *'    # Ejecuta todos los días a las 9:00 AM (hora UTC)
  workflow_dispatch:       # Permite ejecución manual desde la interfaz de GitHub

jobs:
  scraping:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Descargar el código del repositorio
      - uses: actions/checkout@v4
      
      # 2. Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      # 3. Instalar las librerías necesarias
      - name: Instalar librerías
        run: pip install -r requirements.txt
      
      # 4. Ejecutar el script de scraping
      - name: Ejecutar Scraping
        run: python main.py
      
      # 5. Configurar Git para guardar los cambios
      - name: Configurar Git
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
      
      # 6. Subir el CSV al repositorio (si hay cambios)
      - name: Guardar resultados en el repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add resultados.csv
          git commit -m 'Actualizar datos de scraping' || echo "Sin cambios nuevos"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      
      # 7. Guardar como Artifact (descarga temporal) - ✅ ACTUALIZADO A V4
      - name: Subir Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resultados-scraper-${{ github.run_number }}
          path: resultados.csv
          retention-days: 30
