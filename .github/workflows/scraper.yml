name: Scraper Diario

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

# Optar por Node.js 24 para evitar deprecaciones futuras
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 👇 AGREGAR ESTO: Permisos explícitos para que el token funcione
permissions:
  contents: write

jobs:
  scraping:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 👈 Importante para evitar conflictos de historial
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Instalar librerías
        run: pip install -r requirements.txt
      
      - name: Ejecutar Scraping
        run: python main.py
      
      - name: Guardar resultados en el repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Verificar que el archivo existe antes de intentar subirlo
          if [ -f resultados.csv ]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            
            # Pull por si hubo cambios concurrentes
            git pull origin main --rebase || true
            
            git add resultados.csv
            git commit -m '🤖 Actualizar datos de scraping [skip ci]' || echo "⚠️ Sin cambios nuevos"
            
            # Push con token explícito en la URL
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          else
            echo "⚠️ El archivo resultados.csv no fue generado. Revisa main.py"
            exit 1
          fi
      
      - name: Subir Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resultados-scraper-${{ github.run_number }}
          path: resultados.csv
          retention-days: 30
